 {% extends "main/layout.html" %}

{% block title %}Результаты теста{% endblock %}

{% block content %}
<h1 style="text-align:center;">Результаты теста {{ test.title }}</h1>

<div class="results-container" style="margin: 20px auto; max-width: 800px;">

  {% if result %}
    <div class="card" style="padding: 25px; border: 1px solid #ddd; border-radius: 10px; background-color: #f9f9f9;">
      
      <!-- текст результата -->
      <div style="font-size: 16px; color: #333; line-height: 1.6; white-space: pre-line;">
        {{ result }}
      </div>

    </div>
  {% else %}
    <p style="text-align:center; color: #777;">Нет доступных результатов.</p>
  {% endif %}

</div>

<div style="text-align:center; margin-top: 30px;">

  <a href="{% url 'test_home' %}" 
     style="display:inline-block; background:#007bff; color:#fff; padding:10px 18px; border-radius:6px; text-decoration:none; font-size:15px; margin-right:10px;">
     ← К тестам
  </a>

</div>
{% endblock %}
